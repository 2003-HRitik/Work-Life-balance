<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChromaQuest — Work-Life Balance</title>
<meta name="description" content="Find harmony between professional ambition and personal well-being with ChromaQuest.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f0e2;--bg2:#eee3cc;--bg3:#e5d6b8;
  --gold:#c8963e;--gold-light:#dbb266;--gold-dark:#9e7530;--gold-glow:rgba(200,150,62,0.25);
  --ocean:#1a4a6e;--ocean-light:#2a7ab0;--ocean-mid:#1e5a8a;--ocean-pale:#a8d4e8;
  --sunset:#e07830;--sunset-light:#f0985a;--sunset-glow:rgba(224,120,48,0.2);
  --leaf:#3d7a3a;--leaf-light:#5ca858;
  --sand:#f5edd8;--sand-dark:#d4c4a0;
  --brown:#4a2e1a;--brown-light:#6e4a2e;
  --cream:#faf6ec;
  --text:#2e1a08;--text2:#5c4020;--text3:#8a7050;
  --card:rgba(250,246,236,0.92);--card-solid:#faf6ec;
  --shadow:0 8px 32px rgba(74,46,26,0.1);
  --shadow-lg:0 20px 60px rgba(74,46,26,0.15);
  --shadow-gold:0 8px 30px rgba(200,150,62,0.2);
  --radius:20px;--radius-sm:14px;--radius-full:9999px;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
h1,h2,h3,.serif{font-family:'Playfair Display',Georgia,serif}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:8px}

/* Particles */
.particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;border-radius:50%;opacity:0;animation:floatUp linear infinite}
@keyframes floatUp{0%{opacity:0;transform:translateY(100vh) scale(0)}10%{opacity:.5}90%{opacity:.2}100%{opacity:0;transform:translateY(-10vh) scale(1)}}

/* Wave footer */
.footer-wave{position:fixed;bottom:0;left:0;right:0;height:60px;z-index:0;pointer-events:none;overflow:hidden}
.footer-wave svg{position:absolute;bottom:0;width:200%;animation:waveScroll 12s linear infinite}
@keyframes waveScroll{to{transform:translateX(-50%)}}

/* Header */
.header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,rgba(26,74,110,0.96),rgba(30,90,138,0.93));backdrop-filter:blur(20px);border-bottom:2px solid var(--gold);box-shadow:0 4px 20px rgba(26,74,110,0.3)}
.header-inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:70px}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-icon{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--gold),var(--gold-light));display:flex;align-items:center;justify-content:center;color:var(--brown);box-shadow:0 4px 16px var(--gold-glow);transform:perspective(200px) rotateY(-8deg);transition:transform .4s}
.logo-icon:hover{transform:perspective(200px) rotateY(8deg)}
.logo-text{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:800;letter-spacing:2px;color:var(--gold-light);text-shadow:0 2px 8px rgba(0,0,0,0.3)}
.nav{display:flex;gap:4px}
.nav-btn{display:flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--radius-full);border:none;background:transparent;color:var(--ocean-pale);font-weight:600;font-size:.85rem;cursor:pointer;transition:all .3s;font-family:inherit}
.nav-btn:hover{background:rgba(200,150,62,0.15);color:var(--gold-light)}
.nav-btn.active{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--brown);box-shadow:0 4px 20px var(--gold-glow);font-weight:700}
.mobile-nav{display:none;overflow-x:auto;padding:8px 12px;gap:6px;-ms-overflow-style:none;scrollbar-width:none;background:rgba(26,74,110,0.5)}
.mobile-nav::-webkit-scrollbar{display:none}

/* Main */
.main{max-width:1200px;margin:0 auto;padding:32px 24px 80px;position:relative;z-index:1}
.tab-content{animation:fadeUp .6s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* Hero banner */
.hero-banner{position:relative;border-radius:var(--radius);overflow:hidden;margin-bottom:48px;box-shadow:var(--shadow-lg);height:420px}
.hero-banner img{width:100%;height:100%;object-fit:cover}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(26,74,110,0.3) 0%,rgba(26,74,110,0.7) 60%,rgba(26,74,110,0.92) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(200,150,62,0.2);backdrop-filter:blur(10px);padding:8px 22px;border-radius:var(--radius-full);font-size:.8rem;font-weight:700;color:var(--gold-light);border:1.5px solid rgba(200,150,62,0.5);margin-bottom:22px;letter-spacing:1px}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(2.5rem,6.5vw,4.5rem);font-weight:900;line-height:1.1;margin-bottom:16px;color:#fff;text-shadow:0 4px 20px rgba(0,0,0,0.3)}
.hero-title span{color:var(--gold-light)}
.hero-sub{font-size:1.15rem;color:rgba(255,255,255,0.85);max-width:560px;margin:0 auto 32px;line-height:1.7}
.hero-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:var(--radius-full);font-weight:700;font-size:.95rem;border:none;cursor:pointer;transition:all .35s;font-family:inherit;position:relative;overflow:hidden}
.btn:hover{transform:translateY(-3px)}
.btn-primary{background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:var(--brown);box-shadow:var(--shadow-gold)}
.btn-ghost{background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);color:#fff;border:1.5px solid rgba(255,255,255,0.3)}
.btn-ghost:hover{background:rgba(255,255,255,0.25)}

/* Image cards grid */
.img-pillars{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:24px;max-width:960px;margin:0 auto 48px}
.img-pillar{border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:all .4s;position:relative;cursor:pointer;height:340px}
.img-pillar:hover{transform:translateY(-6px) scale(1.01);box-shadow:var(--shadow-lg)}
.img-pillar img{width:100%;height:100%;object-fit:cover;transition:transform .6s}
.img-pillar:hover img{transform:scale(1.06)}
.img-pillar-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(26,74,110,0.85) 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:28px}
.img-pillar-overlay h3{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:800;color:#fff;margin-bottom:6px}
.img-pillar-overlay p{color:rgba(255,255,255,0.8);font-size:.9rem;line-height:1.5}
.img-pillar-icon{position:absolute;top:16px;right:16px;width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;backdrop-filter:blur(10px)}

/* Scale image section */
.scale-section{display:flex;align-items:center;gap:40px;max-width:960px;margin:0 auto 48px;background:var(--cream);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--sand-dark)}
.scale-img{width:45%;height:300px;object-fit:cover;flex-shrink:0}
.scale-text{padding:32px 32px 32px 0;flex:1}
.scale-text h3{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:800;color:var(--ocean);margin-bottom:12px}
.scale-text p{color:var(--text2);line-height:1.75;margin-bottom:16px}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px;max-width:960px;margin:0 auto 48px}
.stat{text-align:center;background:var(--card-solid);padding:28px 20px;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--sand-dark);transition:all .35s;position:relative;overflow:hidden}
.stat::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--gold),var(--sunset))}
.stat:hover{transform:translateY(-4px)}
.stat-num{font-family:'Playfair Display',serif;font-size:2.5rem;font-weight:900;margin-bottom:4px}
.stat-label{font-size:.85rem;color:var(--text3);font-weight:600}

/* Quote with image bg */
.quote-section{position:relative;max-width:960px;margin:0 auto 48px;border-radius:var(--radius);overflow:hidden;height:280px;box-shadow:var(--shadow-lg)}
.quote-section img{width:100%;height:100%;object-fit:cover}
.quote-overlay{position:absolute;inset:0;background:rgba(26,74,110,0.75);backdrop-filter:blur(2px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
.quote-text{font-family:'Playfair Display',serif;font-size:1.35rem;font-style:italic;line-height:1.75;color:#fff;max-width:600px;margin-bottom:14px}
.quote-author{font-size:.9rem;color:var(--gold-light);font-weight:600}

/* Habits */
.habits{max-width:720px;margin:0 auto}
.habits h3{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;margin-bottom:18px;color:var(--ocean);display:flex;align-items:center;gap:10px}
.hab{display:flex;align-items:center;gap:14px;padding:17px 22px;background:var(--cream);border-radius:var(--radius-sm);border:1px solid var(--sand-dark);transition:all .25s;cursor:pointer;margin-bottom:10px}
.hab:hover{box-shadow:var(--shadow);border-color:var(--gold)}
.hab-chk{width:26px;height:26px;border-radius:8px;border:2.5px solid var(--sand-dark);display:flex;align-items:center;justify-content:center;transition:all .3s;flex-shrink:0}
.hab-chk.done{background:linear-gradient(135deg,var(--leaf),var(--leaf-light));border-color:var(--leaf);color:#fff}
.hab-info{flex:1}.hab-name{font-weight:700;font-size:.95rem}.hab-desc{font-size:.8rem;color:var(--text3);margin-top:2px}
.hab-streak{font-size:.75rem;font-weight:700;color:var(--gold-dark);background:rgba(200,150,62,0.12);padding:5px 12px;border-radius:var(--radius-full);white-space:nowrap}

/* Chat */
.chat-box{max-width:820px;margin:0 auto;height:78vh;display:flex;flex-direction:column;background:var(--card-solid);border-radius:var(--radius);box-shadow:var(--shadow-lg);overflow:hidden;border:1px solid var(--sand-dark)}
.chat-head{background:linear-gradient(135deg,var(--ocean),var(--ocean-mid),#1a3a5c);padding:22px 26px;color:#fff;display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--gold)}
.chat-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-light));display:flex;align-items:center;justify-content:center;color:var(--brown);box-shadow:0 4px 12px var(--gold-glow)}
.chat-head h2{font-family:'Playfair Display',serif;font-size:1.2rem}.chat-head p{font-size:.82rem;opacity:.7;margin-top:2px;color:var(--ocean-pale)}
.chat-msgs{flex:1;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:14px;background:linear-gradient(180deg,var(--sand),var(--bg))}
.msg{max-width:78%;padding:15px 20px;border-radius:20px;font-size:.95rem;line-height:1.65;animation:fadeUp .35s ease}
.msg-user{align-self:flex-end;background:linear-gradient(135deg,var(--ocean),var(--ocean-light));color:#fff;border-bottom-right-radius:6px}
.msg-model{align-self:flex-start;background:var(--cream);color:var(--text);border:1px solid var(--sand-dark);border-bottom-left-radius:6px}
.typing{display:flex;gap:6px;padding:15px 22px;align-self:flex-start;background:var(--cream);border-radius:20px;border:1px solid var(--sand-dark)}
.typing span{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:bounce .6s infinite alternate}
.typing span:nth-child(2){animation-delay:.15s}.typing span:nth-child(3){animation-delay:.3s}
@keyframes bounce{to{transform:translateY(-7px);opacity:.3}}
.chat-foot{padding:16px;background:var(--cream);border-top:1px solid var(--sand-dark);display:flex;gap:12px}
.chat-foot input{flex:1;padding:13px 24px;border-radius:var(--radius-full);border:2px solid var(--sand-dark);font-size:.95rem;font-family:inherit;outline:none;background:var(--card-solid);transition:border .25s;color:var(--text)}
.chat-foot input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow)}
.chat-foot button{width:48px;height:48px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:var(--brown);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;box-shadow:var(--shadow-gold)}
.chat-foot button:hover{transform:scale(1.08)}.chat-foot button:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* Zen */
.zen{display:flex;flex-direction:column;align-items:center;padding:20px}
.zen-banner{width:100%;max-width:820px;border-radius:var(--radius);overflow:hidden;margin-bottom:40px;height:200px;position:relative;box-shadow:var(--shadow)}
.zen-banner img{width:100%;height:100%;object-fit:cover}
.zen-banner-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(61,122,58,0.3),rgba(61,122,58,0.75));display:flex;flex-direction:column;align-items:center;justify-content:center}
.zen-banner-overlay h2{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:800;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,0.3)}
.zen-banner-overlay p{color:rgba(255,255,255,0.85);margin-top:6px}
.breath-wrap{position:relative;width:260px;height:260px;display:flex;align-items:center;justify-content:center;margin-bottom:50px}
.breath-ring{position:absolute;border-radius:50%;border:2px solid;transition:all 4s ease-in-out}
.breath-r1{width:100%;height:100%;border-color:rgba(61,122,58,0.12);background:radial-gradient(circle,rgba(61,122,58,0.06),transparent)}
.breath-r2{width:82%;height:82%;border-color:rgba(61,122,58,0.18);background:radial-gradient(circle,rgba(61,122,58,0.1),transparent)}
.breath-r3{width:64%;height:64%;border-color:rgba(200,150,62,0.15);background:radial-gradient(circle,rgba(200,150,62,0.06),transparent)}
.breath-ring.expand{transform:scale(1.3)}
.breath-core{position:relative;z-index:5;width:170px;height:170px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;transition:all .8s;border:3px solid}
.breath-core.idle{background:linear-gradient(135deg,#3a4a5c,#2a3a4c);border-color:rgba(200,150,62,0.3);box-shadow:0 8px 30px rgba(0,0,0,0.2)}
.breath-core.on{background:linear-gradient(135deg,var(--leaf),var(--leaf-light));border-color:var(--gold);box-shadow:0 8px 40px rgba(61,122,58,0.35)}
.breath-time{font-family:'Playfair Display',serif;font-size:2.8rem;font-weight:900;letter-spacing:2px}
.breath-phase{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:4px;opacity:.8;margin-top:4px}
.zen-btns{display:flex;gap:20px;margin-bottom:36px}
.zen-btn{width:62px;height:62px;border-radius:50%;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;box-shadow:var(--shadow)}
.zen-btn:hover{transform:scale(1.1)}
.zen-go{background:linear-gradient(135deg,var(--leaf),var(--leaf-light));color:#fff}
.zen-stop{background:linear-gradient(135deg,var(--sunset),var(--sunset-light));color:#fff}
.zen-rst{background:var(--cream);color:var(--text2);border:2px solid var(--sand-dark)}
.time-pills{display:flex;gap:12px}
.time-pill{padding:11px 24px;border-radius:var(--radius-sm);border:2px solid var(--sand-dark);font-weight:700;cursor:pointer;font-family:inherit;font-size:.9rem;transition:all .25s;background:var(--cream);color:var(--text2)}
.time-pill.on{background:linear-gradient(135deg,var(--leaf),var(--leaf-light));color:#fff;border-color:var(--leaf)}
.time-pill:not(.on):hover{border-color:var(--gold)}

/* Canvas */
.art-head{text-align:center;margin-bottom:32px}
.art-head h2{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:800;background:linear-gradient(135deg,var(--sunset),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.art-head p{color:var(--text2);margin-top:8px}
.canvas-card{max-width:920px;margin:0 auto;background:var(--cream);border-radius:var(--radius);box-shadow:var(--shadow-lg);overflow:hidden;border:1px solid var(--sand-dark)}
.toolbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;padding:14px 20px;background:var(--sand);border-bottom:1px solid var(--sand-dark)}
.swatches{display:flex;gap:8px}
.sw{width:34px;height:34px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all .25s;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.sw.on{border-color:var(--brown);transform:scale(1.15)}.sw:hover{transform:scale(1.12)}
.sizes{display:flex;gap:8px;align-items:center}
.sz{width:30px;height:30px;border-radius:50%;border:2px solid var(--sand-dark);background:var(--cream);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.sz.on{border-color:var(--ocean);background:rgba(26,74,110,0.06)}
.sz-dot{border-radius:50%;background:var(--text)}
.clr-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-full);border:none;background:transparent;color:var(--text3);font-weight:600;font-size:.85rem;cursor:pointer;transition:all .2s;font-family:inherit}
.clr-btn:hover{color:var(--sunset)}
.cv-area{position:relative;height:420px;cursor:crosshair;touch-action:none;background:#fff}
.cv-area canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.act-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;max-width:920px;margin:44px auto 0}
.act-card{border-radius:var(--radius);overflow:hidden;position:relative;height:200px;box-shadow:var(--shadow);transition:all .3s;cursor:pointer}
.act-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.act-card img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.act-card:hover img{transform:scale(1.08)}
.act-card-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 20%,rgba(26,74,110,0.8));display:flex;flex-direction:column;justify-content:flex-end;padding:20px}
.act-card-overlay h4{color:#fff;font-weight:700;font-size:1.05rem;margin-bottom:4px}
.act-card-overlay p{color:rgba(255,255,255,0.8);font-size:.82rem;line-height:1.5}

/* ===== BALANCE TIPS (replaces Guidelines) ===== */
.tips{max-width:960px;margin:0 auto}
.tips-hero{position:relative;border-radius:var(--radius);overflow:hidden;height:260px;margin-bottom:40px;box-shadow:var(--shadow-lg)}
.tips-hero img{width:100%;height:100%;object-fit:cover}
.tips-hero-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(26,74,110,0.7),rgba(200,150,62,0.5));display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.tips-hero-overlay h2{font-family:'Playfair Display',serif;font-size:2.5rem;font-weight:900;color:#fff;text-shadow:0 4px 20px rgba(0,0,0,0.3)}
.tips-hero-overlay p{color:rgba(255,255,255,0.9);margin-top:8px;font-size:1.05rem}

.tip-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;margin-bottom:40px}
.tip-card{background:var(--cream);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);border:1px solid var(--sand-dark);transition:all .35s;position:relative;overflow:hidden}
.tip-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.tip-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.tip-card:nth-child(1)::before{background:linear-gradient(90deg,var(--ocean),var(--ocean-light))}
.tip-card:nth-child(2)::before{background:linear-gradient(90deg,var(--gold),var(--sunset))}
.tip-card:nth-child(3)::before{background:linear-gradient(90deg,var(--leaf),var(--leaf-light))}
.tip-card:nth-child(4)::before{background:linear-gradient(90deg,var(--sunset),#e04060)}
.tip-card:nth-child(5)::before{background:linear-gradient(90deg,#6366f1,#818cf8)}
.tip-card:nth-child(6)::before{background:linear-gradient(90deg,var(--ocean),var(--gold))}
.tip-num{font-family:'Playfair Display',serif;font-size:3rem;font-weight:900;opacity:.08;position:absolute;top:8px;right:16px;line-height:1}
.tip-icon-wrap{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;color:#fff}
.tip-card h4{font-family:'Playfair Display',serif;font-size:1.15rem;font-weight:700;margin-bottom:8px;color:var(--text)}
.tip-card p{color:var(--text2);line-height:1.7;font-size:.92rem}
.tip-card ul{list-style:none;padding:0;margin-top:10px}
.tip-card ul li{padding:4px 0;color:var(--text2);font-size:.88rem;display:flex;align-items:flex-start;gap:8px}
.tip-card ul li::before{content:'✦';color:var(--gold);font-size:.7rem;margin-top:4px;flex-shrink:0}

/* Full-width tip banner */
.tip-banner{display:flex;align-items:stretch;max-width:960px;margin:0 auto 40px;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-lg);min-height:240px}
.tip-banner-img{width:40%;object-fit:cover}
.tip-banner-content{flex:1;padding:36px;background:linear-gradient(135deg,var(--ocean),#1a3a5c);color:#fff;display:flex;flex-direction:column;justify-content:center}
.tip-banner-content h3{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:800;margin-bottom:12px;color:var(--gold-light)}
.tip-banner-content p{line-height:1.75;opacity:.9;margin-bottom:12px}
.tip-banner-content ul{list-style:none;padding:0}
.tip-banner-content ul li{padding:3px 0;display:flex;align-items:center;gap:8px;opacity:.85}
.tip-banner-content ul li::before{content:'→';color:var(--gold-light)}

/* Responsive */
@media(max-width:768px){
  .nav{display:none}.mobile-nav{display:flex}
  .hero-banner{height:320px}.hero-title{font-size:2.2rem}
  .img-pillars{grid-template-columns:1fr}
  .scale-section{flex-direction:column}.scale-img{width:100%;height:200px}
  .scale-text{padding:24px}
  .stats{grid-template-columns:1fr 1fr}
  .chat-box{height:82vh;border-radius:16px}
  .act-cards{grid-template-columns:1fr}
  .tip-cards{grid-template-columns:1fr}
  .tip-banner{flex-direction:column}.tip-banner-img{width:100%;height:200px}
  .toolbar{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="footer-wave"><svg viewBox="0 0 1440 60" preserveAspectRatio="none"><path d="M0,30 C240,60 480,0 720,30 C960,60 1200,0 1440,30 L1440,60 L0,60 Z" fill="rgba(26,74,110,0.06)"/></svg></div>

<header class="header">
  <div class="header-inner">
    <div class="logo"><div class="logo-icon"><i data-lucide="sparkles" style="width:22px;height:22px"></i></div><span class="logo-text">CHROMAQUEST</span></div>
    <nav class="nav" id="desktopNav"></nav>
  </div>
  <div class="mobile-nav" id="mobileNav"></div>
</header>
<main class="main" id="mainContent"></main>

<script>
let activeTab='home';
const API_KEY="";
const API_URL=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-04-17:generateContent?key=${API_KEY}`;
let chatMessages=[{role:'model',text:"Hello! I'm your ChromaQuest Harmony Coach. I can help you brainstorm ways to balance your work, manage stress, or find time for your passions. What's on your mind today?"}];
let chatLoading=false;
let zenTime=300,zenActive=false,zenInterval=null,zenPhase='ready';
let drawCtx=null,drawing=false,brushColor='#1a4a6e',brushSize=4;
const habits=[
  {id:1,name:'Morning Routine',desc:'10-min mindful start before screens',done:false,streak:5},
  {id:2,name:'Lunch Break Walk',desc:'Step outside for at least 15 minutes',done:false,streak:12},
  {id:3,name:'No Emails After 7PM',desc:'Set boundaries with work communication',done:false,streak:3},
  {id:4,name:'Gratitude Journaling',desc:'Write 3 things you are grateful for',done:false,streak:8},
  {id:5,name:'Screen-Free Hour',desc:'1 hour before bed without devices',done:false,streak:2},
];
const quotes=[
  {text:"Balance is not something you find, it's something you create.",author:"Jana Kingsford"},
  {text:"Almost everything will work again if you unplug it for a few minutes — including you.",author:"Anne Lamott"},
  {text:"The key is not to prioritize what's on your schedule, but to schedule your priorities.",author:"Stephen Covey"},
];
const tabs=[
  {id:'home',label:'Harmony',icon:'scale'},
  {id:'ai',label:'AI Coach',icon:'message-circle'},
  {id:'meditation',label:'Zen Zone',icon:'leaf'},
  {id:'activities',label:'Creative Break',icon:'palette'},
  {id:'competition',label:'Balance Tips',icon:'heart'},
];

// Particles
(function(){const c=document.getElementById('particles');const colors=['rgba(200,150,62,0.3)','rgba(26,74,110,0.2)','rgba(224,120,48,0.2)','rgba(61,122,58,0.15)'];for(let i=0;i<18;i++){const p=document.createElement('div');p.className='particle';const s=Math.random()*6+3;p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;background:${colors[i%4]};animation-duration:${Math.random()*15+10}s;animation-delay:${Math.random()*10}s`;c.appendChild(p);}})();

function setTab(id){activeTab=id;if(id!=='meditation'){clearInterval(zenInterval);zenActive=false;}render();lucide.createIcons();}
function render(){renderNav();renderContent();lucide.createIcons();}
function renderNav(){
  const h=tabs.map(t=>`<button class="nav-btn ${activeTab===t.id?'active':''}" onclick="setTab('${t.id}')"><i data-lucide="${t.icon}" style="width:16px;height:16px"></i><span>${t.label}</span></button>`).join('');
  document.getElementById('desktopNav').innerHTML=h;document.getElementById('mobileNav').innerHTML=h;
}
function renderContent(){
  const m=document.getElementById('mainContent');
  const r={home:renderHome,ai:renderChat,meditation:renderZen,activities:renderCreative,competition:renderTips};
  m.innerHTML=`<div class="tab-content">${r[activeTab]()}</div>`;
  if(activeTab==='ai')setupChat();if(activeTab==='meditation')setupZen();if(activeTab==='activities')setupCanvas();
}

// HOME
function renderHome(){
  const q=quotes[Math.floor(Math.random()*quotes.length)];
  return `
  <div class="hero-banner">
    <img src="images/hero.png" alt="Sunset ocean scene" loading="eager"/>
    <div class="hero-overlay">
      <div class="hero-badge"><i data-lucide="sparkles" style="width:14px;height:14px"></i> THEME 2026</div>
      <h1 class="hero-title">WORK-LIFE <span>BALANCE</span></h1>
      <p class="hero-sub">Finding harmony between professional ambition and personal well-being.</p>
      <div class="hero-btns">
        <button class="btn btn-primary" onclick="setTab('ai')"><i data-lucide="message-circle" style="width:18px;height:18px"></i> Ask AI Coach</button>
        <button class="btn btn-ghost" onclick="setTab('competition')"><i data-lucide="heart" style="width:18px;height:18px"></i> Balance Tips</button>
      </div>
    </div>
  </div>

  <div class="img-pillars">
    <div class="img-pillar">
      <img src="images/workspace.png" alt="Professional workspace"/>
      <div class="img-pillar-overlay">
        <h3>The Work</h3>
        <p>Productivity, ambition, and career flow. Technical excellence and professional output.</p>
      </div>
      <div class="img-pillar-icon" style="background:rgba(26,74,110,0.6)"><i data-lucide="briefcase" style="width:22px;height:22px"></i></div>
    </div>
    <div class="img-pillar">
      <img src="images/yoga.png" alt="Beach yoga at sunset"/>
      <div class="img-pillar-overlay">
        <h3>The Life</h3>
        <p>Connection, well-being, joy, and personal pursuits. Living fully and passionately.</p>
      </div>
      <div class="img-pillar-icon" style="background:rgba(224,120,48,0.6)"><i data-lucide="heart" style="width:22px;height:22px"></i></div>
    </div>
  </div>

  <div class="scale-section">
    <img class="scale-img" src="images/scale.png" alt="Golden balance scale"/>
    <div class="scale-text">
      <h3>Finding Your Equilibrium</h3>
      <p>True balance isn't about equal time — it's about being fully present in each moment. When you're working, bring your best self. When you're living, leave work at the door.</p>
      <button class="btn btn-primary" onclick="setTab('meditation')" style="align-self:flex-start"><i data-lucide="leaf" style="width:16px;height:16px"></i> Try Zen Zone</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num" style="color:var(--ocean)">83%</div><div class="stat-label">workers feel stressed</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--sunset)">60%</div><div class="stat-label">don't set boundaries</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--leaf)">4x</div><div class="stat-label">more productive balanced</div></div>
  </div>

  <div class="quote-section">
    <img src="images/nature.png" alt="Forest path"/>
    <div class="quote-overlay">
      <div class="quote-text">"${q.text}"</div>
      <div class="quote-author">— ${q.author}</div>
    </div>
  </div>

  ${renderHabits()}`;
}
function renderHabits(){
  return `<div class="habits"><h3><i data-lucide="check-circle" style="width:22px;height:22px"></i> Daily Balance Habits</h3>
    ${habits.map(h=>`<div class="hab" onclick="toggleHabit(${h.id})"><div class="hab-chk ${h.done?'done':''}">${h.done?'<i data-lucide="check" style="width:14px;height:14px"></i>':''}</div><div class="hab-info"><div class="hab-name" style="${h.done?'text-decoration:line-through;opacity:.5':''}">${h.name}</div><div class="hab-desc">${h.desc}</div></div><div class="hab-streak">🔥 ${h.streak}d</div></div>`).join('')}
  </div>`;
}
function toggleHabit(id){const h=habits.find(x=>x.id===id);if(h){h.done=!h.done;if(h.done)h.streak++;else h.streak=Math.max(0,h.streak-1);}render();}

// CHAT
function renderChat(){
  return `<div class="chat-box"><div class="chat-head"><div class="chat-avatar"><i data-lucide="sparkles" style="width:22px;height:22px"></i></div><div><h2>Harmony AI Coach</h2><p>Your personal guide to work-life balance</p></div></div>
  <div class="chat-msgs" id="chatMsgs">${chatMessages.map(m=>`<div class="msg msg-${m.role}">${esc(m.text)}</div>`).join('')}${chatLoading?'<div class="typing"><span></span><span></span><span></span></div>':''}</div>
  <div class="chat-foot"><input id="chatIn" type="text" placeholder="E.g., How can I stop checking emails after 6 PM?"/><button id="chatBtn" ${chatLoading?'disabled':''}><i data-lucide="send" style="width:18px;height:18px"></i></button></div></div>`;
}
function setupChat(){const i=document.getElementById('chatIn'),b=document.getElementById('chatBtn'),m=document.getElementById('chatMsgs');if(m)m.scrollTop=m.scrollHeight;if(!i||!b)return;i.addEventListener('keydown',e=>{if(e.key==='Enter')sendChat();});b.addEventListener('click',sendChat);}
async function sendChat(){const i=document.getElementById('chatIn');if(!i)return;const t=i.value.trim();if(!t||chatLoading)return;chatMessages.push({role:'user',text:t});chatLoading=true;render();try{const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{parts:[{text:t}]}],systemInstruction:{parts:[{text:"You are a Work-Life Balance coach named 'Harmony'. Brief answers (1-3 paragraphs). Actionable advice. Warm tone."}]}})});const d=await r.json();chatMessages.push({role:'model',text:d.candidates?.[0]?.content?.parts?.[0]?.text||"Let me reflect — could you rephrase?"});}catch(e){chatMessages.push({role:'model',text:"Connection issue. Breathe and try again!"});}chatLoading=false;render();}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ZEN
function renderZen(){
  const a=zenActive,fmt=s=>`${Math.floor(s/60)}:${(s%60<10?'0':'')+(s%60)}`;
  return `<div class="zen">
    <div class="zen-banner"><img src="images/zen.png" alt="Zen stones"/><div class="zen-banner-overlay"><h2>Zen Zone</h2><p>Take a moment to reconnect. Follow the breathing circle.</p></div></div>
    <div class="breath-wrap">
      <div class="breath-ring breath-r1 ${a&&zenPhase==='breathe in'?'expand':''}"></div>
      <div class="breath-ring breath-r2 ${a&&zenPhase==='breathe in'?'expand':''}" style="transition-delay:.1s"></div>
      <div class="breath-ring breath-r3 ${a&&zenPhase==='breathe in'?'expand':''}" style="transition-delay:.2s"></div>
      <div class="breath-core ${a?'on':'idle'}"><div class="breath-time">${fmt(zenTime)}</div><div class="breath-phase">${zenPhase}</div></div>
    </div>
    <div class="zen-btns">
      <button class="zen-btn ${a?'zen-stop':'zen-go'}" onclick="toggleZen()"><i data-lucide="${a?'pause':'play'}" style="width:26px;height:26px${a?'':';margin-left:3px'}"></i></button>
      <button class="zen-btn zen-rst" onclick="resetZen()"><i data-lucide="rotate-ccw" style="width:22px;height:22px"></i></button>
    </div>
    <div class="time-pills">${[60,300,600].map(t=>`<button class="time-pill ${zenTime===t&&!a?'on':''}" onclick="setZenTime(${t})">${t/60} min</button>`).join('')}</div>
  </div>`;
}
function setupZen(){if(zenActive)startZen();}
function toggleZen(){zenActive=!zenActive;if(zenActive)startZen();else clearInterval(zenInterval);render();}
function resetZen(){zenActive=false;clearInterval(zenInterval);zenTime=300;zenPhase='ready';render();}
function setZenTime(t){zenActive=false;clearInterval(zenInterval);zenTime=t;zenPhase='ready';render();}
function startZen(){clearInterval(zenInterval);zenInterval=setInterval(()=>{if(zenTime>0){zenTime--;const c=zenTime%12;zenPhase=c>=8?'breathe in':c>=6?'hold':'breathe out';const core=document.querySelector('.breath-core'),rings=document.querySelectorAll('.breath-ring');if(core){core.querySelector('.breath-time').textContent=`${Math.floor(zenTime/60)}:${(zenTime%60<10?'0':'')+(zenTime%60)}`;core.querySelector('.breath-phase').textContent=zenPhase;}rings.forEach(r=>{if(zenPhase==='breathe in')r.classList.add('expand');else r.classList.remove('expand');});}else{zenActive=false;clearInterval(zenInterval);zenPhase='done 🎉';render();}},1000);}

// CREATIVE
function renderCreative(){
  const pal=['#1a4a6e','#c8963e','#e07830','#3d7a3a','#e11d48','#2a3a4c','#ffffff'];
  return `<div class="art-head"><h2>Creative Break</h2><p>Doodle, sketch, and let your mind wander freely.</p></div>
  <div class="canvas-card">
    <div class="toolbar">
      <div class="swatches">${pal.map(c=>`<div class="sw ${brushColor===c?'on':''}" style="background:${c}${c==='#ffffff'?';border:2px solid #ccc':''}" onclick="pickColor('${c}')"></div>`).join('')}</div>
      <div class="sizes">${[2,4,8,14].map(s=>`<div class="sz ${brushSize===s?'on':''}" onclick="pickSize(${s})"><div class="sz-dot" style="width:${s+2}px;height:${s+2}px"></div></div>`).join('')}</div>
      <button class="clr-btn" onclick="clearCv()"><i data-lucide="rotate-ccw" style="width:14px;height:14px"></i> Clear</button>
    </div>
    <div class="cv-area" id="cvArea"><canvas id="cvs"></canvas></div>
  </div>
  <div class="act-cards">
    <div class="act-card"><img src="images/workspace.png" alt="Quick stretch"/><div class="act-card-overlay"><h4><i data-lucide="clock" style="width:16px;height:16px"></i> Quick Stretch</h4><p>2-minute desk exercises to reset your body.</p></div></div>
    <div class="act-card"><img src="images/zen.png" alt="Color therapy"/><div class="act-card-overlay"><h4><i data-lucide="palette" style="width:16px;height:16px"></i> Color Therapy</h4><p>Free-form digital sketching on the canvas above.</p></div></div>
    <div class="act-card"><img src="images/nature.png" alt="Nature walk"/><div class="act-card-overlay"><h4><i data-lucide="trees" style="width:16px;height:16px"></i> Nature Walk</h4><p>Step outside for 10 minutes of fresh air.</p></div></div>
  </div>`;
}
function setupCanvas(){const cv=document.getElementById('cvs'),ar=document.getElementById('cvArea');if(!cv||!ar)return;const r=ar.getBoundingClientRect();cv.width=r.width*2;cv.height=420*2;drawCtx=cv.getContext('2d');drawCtx.scale(2,2);drawCtx.lineCap='round';drawCtx.lineJoin='round';drawCtx.fillStyle='#fff';drawCtx.fillRect(0,0,cv.width,cv.height);const xy=e=>{const r=cv.getBoundingClientRect();if(e.touches?.length)return{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top};return{x:e.offsetX,y:e.offsetY};};cv.onmousedown=e=>{drawing=true;const{x,y}=xy(e);drawCtx.beginPath();drawCtx.moveTo(x,y);};cv.onmousemove=e=>{if(!drawing)return;const{x,y}=xy(e);drawCtx.strokeStyle=brushColor;drawCtx.lineWidth=brushSize;drawCtx.lineTo(x,y);drawCtx.stroke();};cv.onmouseup=cv.onmouseout=()=>{if(drawing){drawCtx.closePath();drawing=false;}};cv.ontouchstart=e=>{e.preventDefault();drawing=true;const{x,y}=xy(e);drawCtx.beginPath();drawCtx.moveTo(x,y);};cv.ontouchmove=e=>{e.preventDefault();if(!drawing)return;const{x,y}=xy(e);drawCtx.strokeStyle=brushColor;drawCtx.lineWidth=brushSize;drawCtx.lineTo(x,y);drawCtx.stroke();};cv.ontouchend=()=>{drawCtx.closePath();drawing=false;};}
function pickColor(c){brushColor=c;document.querySelectorAll('.sw').forEach(s=>{const bg=s.style.background;s.classList.toggle('on',bg.includes(c)||(c==='#ffffff'&&bg.includes('rgb(255, 255, 255)')));});}
function pickSize(s){brushSize=s;document.querySelectorAll('.sz').forEach((el,i)=>el.classList.toggle('on',[2,4,8,14][i]===s));}
function clearCv(){if(!drawCtx)return;const c=document.getElementById('cvs');drawCtx.fillStyle='#fff';drawCtx.fillRect(0,0,c.width,c.height);}

// BALANCE TIPS (replaces Guidelines)
function renderTips(){
  return `<div class="tips">
    <div class="tips-hero"><img src="images/hero.png" alt="Balance"/><div class="tips-hero-overlay"><h2>The Art of Balance</h2><p>Practical wisdom for harmonizing work and life</p></div></div>

    <div class="tip-cards">
      <div class="tip-card"><div class="tip-num">01</div>
        <div class="tip-icon-wrap" style="background:linear-gradient(135deg,var(--ocean),var(--ocean-light))"><i data-lucide="clock" style="width:24px;height:24px"></i></div>
        <h4>Set Sacred Boundaries</h4>
        <p>Your time is your most precious resource. Protect it fiercely.</p>
        <ul><li>Define a hard stop time each day</li><li>Turn off work notifications after hours</li><li>Create a shutdown ritual to end your workday</li><li>Learn to say "no" without guilt</li></ul>
      </div>
      <div class="tip-card"><div class="tip-num">02</div>
        <div class="tip-icon-wrap" style="background:linear-gradient(135deg,var(--gold),var(--sunset))"><i data-lucide="battery-charging" style="width:24px;height:24px"></i></div>
        <h4>Recharge Intentionally</h4>
        <p>Rest isn't lazy — it's strategic. Your best work comes from a rested mind.</p>
        <ul><li>Take a 10-minute walk after lunch</li><li>Practice the 20-20-20 eye rule</li><li>Schedule "do nothing" time weekly</li><li>Sleep 7-8 hours non-negotiably</li></ul>
      </div>
      <div class="tip-card"><div class="tip-num">03</div>
        <div class="tip-icon-wrap" style="background:linear-gradient(135deg,var(--leaf),var(--leaf-light))"><i data-lucide="brain" style="width:24px;height:24px"></i></div>
        <h4>Mindful Presence</h4>
        <p>Be where your feet are. Full presence beats divided attention every time.</p>
        <ul><li>Put your phone away during meals</li><li>Practice 5 minutes of daily meditation</li><li>Use the Pomodoro technique for focus</li><li>Single-task instead of multi-tasking</li></ul>
      </div>
      <div class="tip-card"><div class="tip-num">04</div>
        <div class="tip-icon-wrap" style="background:linear-gradient(135deg,var(--sunset),#e04060)"><i data-lucide="heart" style="width:24px;height:24px"></i></div>
        <h4>Nurture Relationships</h4>
        <p>No career success compensates for loneliness. Invest in people who matter.</p>
        <ul><li>Schedule undistracted time with loved ones</li><li>Have at least one tech-free meal daily</li><li>Call a friend instead of scrolling</li><li>Be fully present in conversations</li></ul>
      </div>
      <div class="tip-card"><div class="tip-num">05</div>
        <div class="tip-icon-wrap" style="background:linear-gradient(135deg,#6366f1,#818cf8)"><i data-lucide="target" style="width:24px;height:24px"></i></div>
        <h4>Work Smarter, Not Longer</h4>
        <p>Efficiency beats hours at the desk. Protect your peak energy hours.</p>
        <ul><li>Identify your 2-3 most productive hours</li><li>Batch similar tasks together</li><li>Delegate what others can do</li><li>Eliminate unnecessary meetings</li></ul>
      </div>
      <div class="tip-card"><div class="tip-num">06</div>
        <div class="tip-icon-wrap" style="background:linear-gradient(135deg,var(--ocean),var(--gold))"><i data-lucide="palette" style="width:24px;height:24px"></i></div>
        <h4>Feed Your Passions</h4>
        <p>Hobbies aren't luxuries — they're essential to your identity beyond work.</p>
        <ul><li>Dedicate 30 min daily to a hobby</li><li>Try something creative each week</li><li>Move your body in ways you enjoy</li><li>Spend time in nature regularly</li></ul>
      </div>
    </div>

    <div class="tip-banner">
      <img class="tip-banner-img" src="images/yoga.png" alt="Yoga at sunset"/>
      <div class="tip-banner-content">
        <h3>The 5-4-3-2-1 Reset</h3>
        <p>When overwhelm strikes, ground yourself instantly with this sensory technique:</p>
        <ul><li><strong>5</strong> things you can see</li><li><strong>4</strong> things you can touch</li><li><strong>3</strong> things you can hear</li><li><strong>2</strong> things you can smell</li><li><strong>1</strong> thing you can taste</li></ul>
      </div>
    </div>
  </div>`;
}

render();
</script>
</body>
</html>
